<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Assistant Pro</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    /* ===== YOUR ORIGINAL CSS (UNCHANGED) ===== */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#080810;--surface:#0f0f1a;--card:#14141f;--border:#1c1c2e;
      --accent:#7fff6e;--accent2:#6ef0ff;--accent3:#ff9f6e;
      --muted:#2e2e45;--text:#eaeaf8;--subtext:#5a5a80;
      --danger:#ff5e5e;--radius:14px;
      --font:'Syne',sans-serif;--mono:'JetBrains Mono',monospace;
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font)}
    #app{display:flex;height:100vh;overflow:hidden}

    .sidebar{width:250px;min-width:250px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
    .sidebar-header{padding:20px 16px 14px;border-bottom:1px solid var(--border)}
    .logo{font-size:18px;font-weight:800}
    .logo span{color:var(--accent)}
    .new-chat-btn{margin:12px 10px;background:var(--accent);border:none;border-radius:8px;padding:10px;font-weight:700;cursor:pointer;width:calc(100% - 20px)}
    .sessions-list{flex:1;overflow-y:auto;padding:4px 8px}
    .session-item{padding:8px;border-radius:8px;cursor:pointer}
    .session-item:hover{background:var(--card)}

    .main{flex:1;display:flex;flex-direction:column}
    .topbar{padding:13px 22px;border-bottom:1px solid var(--border);display:flex;gap:12px;background:var(--surface)}
    .messages{flex:1;overflow-y:auto;padding:24px 20px;display:flex;flex-direction:column;gap:16px}

    .msg{display:flex;gap:10px}
    .msg.user{flex-direction:row-reverse}
    .avatar{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center}
    .avatar.user{background:var(--accent);color:#000}
    .avatar.assistant{background:var(--card);border:1px solid var(--border)}
    .bubble{padding:11px 15px;border-radius:12px;max-width:100%}
    .msg.user .bubble{background:var(--accent);color:#000}
    .msg.assistant .bubble{background:var(--card);border:1px solid var(--border)}

    .input-area{padding:14px 20px;border-top:1px solid var(--border)}
    .input-row{display:flex;gap:10px;background:var(--card);padding:10px;border-radius:12px}
    textarea{flex:1;background:none;border:none;outline:none;color:var(--text)}
    .send-btn{background:var(--accent);border:none;width:34px;height:34px;border-radius:8px;cursor:pointer}
  </style>
</head>

<body>
<div id="app">

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">AI<span>.</span>Pro</div>
    </div>
    <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
    <div class="sessions-list" id="sessionsList"></div>
  </aside>

  <main class="main">

    <div class="topbar">
      <div>AI Assistant Pro</div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
      <div class="input-row">
        <textarea id="messageInput" placeholder="Message AI..." rows="1"></textarea>
        <button class="send-btn" onclick="sendMessage()">↑</button>
      </div>
    </div>

  </main>
</div>

<script>
/* ===================== FIX #1: CORRECT API ===================== */
const API = "https://ai-assistant-pro-ayb2.onrender.com";

let sessionId = crypto.randomUUID();
let isLoading = false;

/* ===================== SAFE FETCH HELPER ===================== */
async function safeJson(url, options) {
  const res = await fetch(url, options);
  const text = await res.text();

  try {
    return { ok: res.ok, data: JSON.parse(text) };
  } catch {
    return { ok: false, data: { raw: text } };
  }
}

/* ===================== SEND MESSAGE ===================== */
async function sendMessage() {
  const input = document.getElementById("messageInput");
  const text = input.value.trim();
  if (!text || isLoading) return;

  input.value = "";
  addMessage("user", text);
  addMessage("assistant", "Thinking...");

  isLoading = true;

  const { ok, data } = await safeJson(`${API}/chat`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      message: text,
      session_id: sessionId,
      max_tokens: 1024
    })
  });

  removeLastMessage();

  if (!ok) {
    addMessage("assistant", "⚠ Error: " + (data.detail || data.raw || "Request failed"));
  } else {
    addMessage("assistant", data.response || "No response");
  }

  isLoading = false;
}

/* ===================== HEALTH CHECK ===================== */
async function checkHealth() {
  const { ok, data } = await safeJson(`${API}/health`);
  if (ok) {
    console.log("Model:", data);
  } else {
    setTimeout(checkHealth, 3000);
  }
}

/* ===================== UI ===================== */
function addMessage(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;

  div.innerHTML = `
    <div class="avatar ${role}">${role === "user" ? "U" : "AI"}</div>
    <div class="bubble">${text}</div>
  `;

  document.getElementById("messages").appendChild(div);
}

function removeLastMessage() {
  const msgs = document.getElementById("messages");
  if (msgs.lastChild) msgs.removeChild(msgs.lastChild);
}

/* ===================== INIT ===================== */
checkHealth();
</script>

</body>
</html>
